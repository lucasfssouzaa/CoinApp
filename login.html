<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Login - Coin App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2747d6 0%, #1d069e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .google-btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
        }

        .google-btn:hover {
            background: #3367d6;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(66, 133, 244, 0.4);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .success {
            color: #27ae60;
            margin-top: 20px;
            display: none;
        }

        #name {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🪙 Coin</div>
        <div class="subtitle">Informe seu nome para continuar</div>

        <input type="text" id="name" placeholder="Nome">
        <button class="google-btn" onclick="criarConta()" id="googleBtn">
            Criar conta
        </button>

        <div class="success" id="success"></div>
    </div>
</body>
<script src="js/main.js"></script>
<script>
    //busca um config no localstorage
    const config = localStorage.getItem('config')
    if (config) {
        // window.location.href = 'home.html'
    }

    function criarConta() {
        const name = document.getElementById('name').value
        if(name == '') {
            AlertError('Informe seu nome para continuar')
            return
        }
        if (name) {
            localStorage.clear()
            let config = {
                name: name,
                categoria: [],
                subcategoria: [],
                receita: [],
                despesa: [],
                mesesCad: []
            }
            let idRef = {
                receitas: 1,
                despesas: 1,
                provisoes: 1
            }
            localStorage.setItem('config', JSON.stringify(config))
            localStorage.setItem('idRef', JSON.stringify(idRef))
            window.location.href = 'home.html'
        }
    }
</script>
</html>
