<html lang="pt-br">
<style>
    .btnGastoFixo{
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        width: -webkit-fill-available;
        margin: 10px;
        height: 50px;
        font-size: 1.2rem;
    }

    .inputDesc, .inputValor{
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
        margin-bottom: 10px;
    }

    .add, .editSave{
        color: white;
        padding: 5px;
        border-radius: 5px;
        width: 30px;
        margin: 10px;
        height: 30px;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        right: 10px;
    }

    .add{
        background-color: #0fc918;
    }

    .editSave{
        background-color: #007bff;
    }

    .edit:hover{
        color: #007bff;
    }
    
    .delete:hover{
        color: #dc3545;
    }

    .edit, .delete{
        cursor: pointer;
        transition: background-color 0.3s ease;
        font-size: 18px;
    }
</style>
<body>
<div id="voltar" style="display: none;">
    <span onclick="voltar()"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M11.8 13H15q.425 0 .713-.288T16 12t-.288-.712T15 11h-3.2l.9-.9q.275-.275.275-.7t-.275-.7t-.7-.275t-.7.275l-2.6 2.6q-.3.3-.3.7t.3.7l2.6 2.6q.275.275.7.275t.7-.275t.275-.7t-.275-.7zm.2 9q-2.075 0-3.9-.788t-3.175-2.137T2.788 15.9T2 12t.788-3.9t2.137-3.175T8.1 2.788T12 2t3.9.788t3.175 2.137T21.213 8.1T22 12t-.788 3.9t-2.137 3.175t-3.175 2.138T12 22"/></svg></span>
</div>
<!-- Tela Inicial de Gastos Fixos -->
<div id="buttonContainer" style="display: block;">
    <h1>Gastos Fixos</h1>
    <div>
        <button class="btnGastoFixo" id="btnAdicionarGastoFixo" onClick="exibeMenu('receitaContainer')">Receitas</button>
        <button class="btnGastoFixo" id="btnEditarGastoFixo" onClick="exibeMenu('despesaContainer')">Despesas</button>
    </div>
    <p>Gastos fixos serão atribuídos a todos os meses automaticamente, podendo ser editados ou removidos a qualquer momento</p>
</div>

<!-- Tela de Receitas -->
<div id="receitaContainer" style="display: none;">
    <h1>Receitas</h1>
    <div id="form_receita">
        <input type="text" id="descricao_receita" placeholder="Descrição" class="inputDesc">
        <input type="number" id="valor_receita" placeholder="Valor" class="inputValor">
        <input style="display: none;" type="text" id="descricao_edit_receita" placeholder="Descrição" class="inputDesc">
        <input style="display: none;" type="number" id="valor_edit_receita" placeholder="Valor" class="inputValor">
        <div class="add" id="add_receita" onClick="addFixo('receita')">
            <span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M11 13H5v-2h6V5h2v6h6v2h-6v6h-2z"/></svg></span>
        </div>
        <div class="editSave" id="edit_receita" onClick="salvarFixoEditado('receita', 0)" style="display: none;">
            <span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M4 21q-.425 0-.712-.288T3 20v-2.425q0-.4.15-.763t.425-.637L16.2 3.575q.3-.275.663-.425t.762-.15t.775.15t.65.45L20.425 5q.3.275.437.65T21 6.4q0 .4-.138.763t-.437.662l-12.6 12.6q-.275.275-.638.425t-.762.15zM17.6 7.8L19 6.4L17.6 5l-1.4 1.4z"/></svg></span>
        </div>
        <table id="table_receita" style="display: none;" class="tableValores">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th style="width: 40px;"></th>
                    <th style="width: 40px;"></th>
                </tr>
            </thead>
            <tbody id="body_receita">
            </tbody>
        </table>
    </div>
</div>

<!-- Tela de despesas -->
<div id="despesaContainer" style="display: none;">
    <h1>Despesas</h1>
    <div id="form_despesa">
        <input type="text" id="descricao_despesa" placeholder="Descrição" class="inputDesc">
        <input type="number" id="valor_despesa" placeholder="Valor" class="inputValor">
        <input style="display: none;" type="text" id="descricao_edit_despesa" placeholder="Descrição" class="inputDesc">
        <input style="display: none;" type="number" id="valor_edit_despesa" placeholder="Valor" class="inputValor">
        <div class="add" id="add_despesa" onClick="addFixo('despesa')">
            <span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M11 13H5v-2h6V5h2v6h6v2h-6v6h-2z"/></svg></span>
        </div>
        <div class="editSave" id="edit_despesa" onClick="salvarFixoEditado('despesa', 0)" style="display: none;">
            <span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M4 21q-.425 0-.712-.288T3 20v-2.425q0-.4.15-.763t.425-.637L16.2 3.575q.3-.275.663-.425t.762-.15t.775.15t.65.45L20.425 5q.3.275.437.65T21 6.4q0 .4-.138.763t-.437.662l-12.6 12.6q-.275.275-.638.425t-.762.15zM17.6 7.8L19 6.4L17.6 5l-1.4 1.4z"/></svg></span>
        </div>
        <table id="table_despesa" style="display: none;" class="tableValores">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th style="width: 40px;"></th>
                    <th style="width: 40px;"></th>
                </tr>
            </thead>
            <tbody id="body_despesa">
            </tbody>
        </table>
    </div>
</div>

</body>
<script src="js/jquery-3.7.1.min.js"></script>
<script>

    if(!config.receita){
        config.receita = [];
        localStorage.setItem('config', JSON.stringify(config));
    }
    if(!config.despesa){
        config.despesa = [];
        localStorage.setItem('config', JSON.stringify(config));
    }

    function formatNumber(valor) {
        return new Intl.NumberFormat("pt-BR", {
            style: "currency",
            currency: "BRL",
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }).format(valor);
    }
    
    // Aguardar o DOM estar pronto antes de executar montarFixo
    $(document).ready(function() {
        montarFixo('receita');
        montarFixo('despesa');
    });

    function montarFixo(table){
        $('#table_'+table).hide();
        $('#body_'+table).html('');
        if(config[table]){
            let fixo = config[table];
            let valor = 0;
            let descricao = '';
            for(let i = 0; i < fixo.length; i++){
                valor = fixo[i].valor;
                descricao = fixo[i].descricao;
                valor = formatNumber(valor);
                $('#body_'+table).append(`
                    <tr id="${table}${i}">
                        <td>${descricao}</td>
                        <td>${valor}</td>
                        <td><span class="edit icon" onClick="editarFixo('${table}', ${i})"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 -1 24 24"><path fill="currentColor" d="M6 22q-1.25 0-2.125-.875T3 19v-2q0-.425.288-.712T4 16h2V4q0-.825.588-1.412T8 2h11q.825 0 1.413.588T21 4v6q0 .425-.288.713T20 11t-.712-.288T19 10V4H8v12h3.975q.575 0 .788.513t-.188.912q-.275.275-.425.638t-.15.762V21q0 .425-.288.713T11 22zm8-1v-1.65q0-.2.075-.4t.225-.325l5.225-5.2q.225-.225.5-.325t.55-.1q.3 0 .575.113t.5.337l.925.925q.2.225.313.5t.112.55t-.1.563t-.325.512l-5.2 5.2q-.125.125-.325.213t-.4.087H15q-.425 0-.712-.288T14 21m6.575-4.6l.925-.975l-.925-.925l-.95.95zM10 10h7q.425 0 .713.288T18 11t-.288.713T17 12h-7q-.425 0-.712-.288T9 11t.288-.712T10 10m0-3h7q.425 0 .713.288T18 8t-.288.713T17 9h-7q-.425 0-.712-.288T9 8t.288-.712T10 7"/></svg></span></td>
                        <td><span class="delete icon" onClick="removerFixo('${table}', ${i})"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 -1 24 24"><path fill="currentColor" d="M7 21q-.825 0-1.412-.587T5 19V6H4V4h5V3h6v1h5v2h-1v13q0 .825-.587 1.413T17 21zM17 6H7v13h10zM9 17h2V8H9zm4 0h2V8h-2zM7 6v13z"/></svg></span></td>
                    </tr>
                `);
            }
            if(fixo.length > 0){
                $('#table_'+table).show();
            }
        }
    }

    async function addFixo(table){
        let descricao = document.getElementById('descricao_'+table).value;
        let valor = document.getElementById('valor_'+table).value;

        if(table == 'despesa'){
            criaCategoria(descricao);
        }

        // varre todo o config.table
        for(let i = 0; i < config[table].length; i++){
            if(config[table][i].descricao == descricao){
                //nome da table maiusculo
                let msgExiste = table.charAt(0).toUpperCase() + table.slice(1) + ' <b>' + descricao + '</b> já existe';
                AlertError(msgExiste);
                return;
            }
        }


        valor = parseFloat(valor);
        valor = valor.toFixed(2);
        
        if(descricao == '' || valor == ''){
            AlertError('Preencha todos os campos');
            return;
        }

        config[table].push({descricao: descricao, valor: valor});
        localStorage.setItem('config', JSON.stringify(config));
        document.getElementById('descricao_'+table).value = '';
        document.getElementById('valor_'+table).value = '';

        if(mesCadastrado(mesAtual)){
            const response = await showConfirmYesNo('Deseja aplicar a mudança no mês atual?');
            if(response){
                if(table == 'receita'){
                    receitasCreate(descricao, valor, true)
                } else if(table == 'despesa'){
                    provisoesCreate(descricao, valor, true)
                }
            } else {
                if(table == 'receita'){
                    receitasCreate(descricao, valor, false)
                } else if(table == 'despesa'){
                    provisoesCreate(descricao, valor, false)
                }
            }
        } else {
            if(table == 'receita'){
                receitasCreate(descricao, valor, false)
            } else if(table == 'despesa'){
                provisoesCreate(descricao, valor, false)
            }
        }


        valor = formatNumber(valor);
        $('#body_'+table).append(`
            <tr id="${table}${config[table].length - 1}">
                <td>${descricao}</td>
                <td>${valor}</td>    
                <td><span class="edit icon" onClick="editarFixo('${table}', ${config[table].length - 1})"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 -1 24 24"><path fill="currentColor" d="M6 22q-1.25 0-2.125-.875T3 19v-2q0-.425.288-.712T4 16h2V4q0-.825.588-1.412T8 2h11q.825 0 1.413.588T21 4v6q0 .425-.288.713T20 11t-.712-.288T19 10V4H8v12h3.975q.575 0 .788.513t-.188.912q-.275.275-.425.638t-.15.762V21q0 .425-.288.713T11 22zm8-1v-1.65q0-.2.075-.4t.225-.325l5.225-5.2q.225-.225.5-.325t.55-.1q.3 0 .575.113t.5.337l.925.925q.2.225.313.5t.112.55t-.1.563t-.325.512l-5.2 5.2q-.125.125-.325.213t-.4.087H15q-.425 0-.712-.288T14 21m6.575-4.6l.925-.975l-.925-.925l-.95.95zM10 10h7q.425 0 .713.288T18 11t-.288.713T17 12h-7q-.425 0-.712-.288T9 11t.288-.712T10 10m0-3h7q.425 0 .713.288T18 8t-.288.713T17 9h-7q-.425 0-.712-.288T9 8t.288-.712T10 7"/></svg></span></td>
                <td><span class="delete icon" onClick="removerFixo('${table}', ${config[table].length - 1})"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 -1 24 24"><path fill="currentColor" d="M7 21q-.825 0-1.412-.587T5 19V6H4V4h5V3h6v1h5v2h-1v13q0 .825-.587 1.413T17 21zM17 6H7v13h10zM9 17h2V8H9zm4 0h2V8h-2zM7 6v13z"/></svg></span></td>
            </tr>
        `);
        $('#table_'+table).show();
    }

    function exibeMenu(menu){
        $('#'+menu).show();
        $('#buttonContainer').hide();
        $('#voltar').show();
    }

    function voltar(){
        $('#receitaContainer').hide();
        $('#despesaContainer').hide();

        $('#buttonContainer').show();
        $('#voltar').hide();
    }

    
    async function removerFixo(table, id){
      const descricao = config[table][id].descricao;
      if(table == 'receita'){
        msgConfirm = `Deseja excluir a receita <b>${descricao}</b>?`;
      } else if(table == 'despesa'){
        msgConfirm = `Deseja excluir a despesa <b>${descricao}</b>?`;
      }
      const response = await showConfirm(msgConfirm);
      if(response){
        config[table].splice(id, 1);
        localStorage.setItem('config', JSON.stringify(config));
        montarFixo(table);

        await new Promise(resolve => setTimeout(resolve, 200));

        if(mesCadastrado(mesAtual)){
            const response = await showConfirmYesNo('Deseja aplicar a mudança no mês atual?');
            if(response){
                if(table == 'receita'){
                    receitasDel(descricao, true)
                } else if(table == 'despesa'){
                    provisaoesDel(descricao, true)
                }
            } else {
                if(table == 'receita'){
                    receitasDel(descricao, false)
                } else if(table == 'despesa'){
                    provisaoesDel(descricao, false)
                }
            }
        } else {
            if(table == 'receita'){
                receitasDel(descricao, false)
            } else if(table == 'despesa'){
                provisaoesDel(descricao, false)
            }
        }
        
        // faça a ação desejada aqui
      } else {
        console.log('Confirmação cancelada');
      }
    }

    function editarFixo(table, id){
        editId[table] = id;
        $('#table_'+table).hide();
        $('#descricao_edit_'+table).val(config[table][id].descricao);
        $('#valor_edit_'+table).val(config[table][id].valor);
        
        $('#descricao_'+table).hide();
        $('#valor_'+table).hide();
        $('#add_'+table).hide();
        $('#descricao_edit_'+table).show();
        $('#valor_edit_'+table).show();
        $('#edit_'+table).show();
    }

    async function salvarFixoEditado(table){
        let descricao = document.getElementById('descricao_edit_'+table).value;
        let valor = document.getElementById('valor_edit_'+table).value;
        valor = parseFloat(valor);
        valor = valor.toFixed(2);

        if(table == 'despesa'){
            criaCategoria(descricao);
        }

        for(let i = 0; i < config[table].length; i++){
            if(config[table][i].descricao == descricao && i != editId[table]){
                //nome da table maiusculo
                let msgExiste = table.charAt(0).toUpperCase() + table.slice(1) + ' <b>' + descricao + '</b> já existe';
                AlertError(msgExiste);
                return;
            }
        }

        if(descricao == ''){
            AlertError('Preencha a descrição');
            return;
        }

        let nomeAnterior = config[table][editId[table]].descricao;
        
        config[table][editId[table]].descricao = descricao;
        config[table][editId[table]].valor = valor;
        localStorage.setItem('config', JSON.stringify(config));
        $('#descricao_edit_'+table).hide();
        $('#valor_edit_'+table).hide();
        $('#edit_'+table).hide();
        $('#descricao_'+table).show();
        $('#valor_'+table).show();
        $('#add_'+table).show();

        let nomeNovo = descricao;
        let valorNovo = valor;

        // atualiza os registros já cadastrados no controle financeiro
        if(mesCadastrado(mesAtual)){
            const response = await showConfirmYesNo('Deseja aplicar a mudança no mês atual?');
            if(response){
                if(table == 'receita'){
                    console.log('receitasUpd: ', nomeAnterior, nomeNovo, valorNovo, true)
                    receitasUpd(nomeAnterior, nomeNovo, valorNovo, true)
                } else if(table == 'despesa'){
                    provisaoesUpd(nomeAnterior, nomeNovo, valorNovo, true)
                }
            } else {
                if(table == 'receita'){
                    receitasUpd(nomeAnterior, nomeNovo, valorNovo, false)
                } else if(table == 'despesa'){
                    provisaoesUpd(nomeAnterior, nomeNovo, valorNovo, false)
                }
            }
        } else {
            if(table == 'receita'){
                receitasUpd(nomeAnterior, nomeNovo, valorNovo, false)
            } else if(table == 'despesa'){
                provisaoesUpd(nomeAnterior, nomeNovo, valorNovo, false)
            }
        }

        //Altera o valor na tabela
        valor = formatNumber(valor);
        $('#'+table+editId[table]).find('td:nth-child(2)').text(valor);
        $('#'+table+editId[table]).find('td:nth-child(1)').text(descricao);
        $('#table_'+table).show();

        $('#'+table+editId[table]).css('background-color', '#6d6d6d');
        $('#'+table+editId[table]).css('transition', 'background-color 0.5s ease');
        setTimeout(function(){
            $('#'+table+editId[table]).css('background-color', 'transparent');
            $('#'+table+editId[table]).css('transition', 'background-color 0.5s ease');
        }, 500);
    }

    function criaCategoria(descricao){
        let categoriaExiste = false;
        //varre todo o config.categoria
        for(let i = 0; i < config.categoria.length; i++){
            if(config.categoria[i].nome == descricao){
                categoriaExiste = true;
                break;
            }
        }
        if(!categoriaExiste){
            config.categoria.push({nome: descricao});
            localStorage.setItem('config', JSON.stringify(config));
        }
    }
</script>
</html>
