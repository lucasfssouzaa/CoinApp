<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>App Mobile — Menu Lateral</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>

  <script src="../js/jquery-3.7.1.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/functions.js"></script>
  <script src="../js/crud.js"></script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root {
      --bg: #ffffff;
      --card: #f7f9fb;
      --text: #111111;
      --muted: #666666;
      --primary: #2C2AB1;
      --overlay: rgba(0,0,0,.6);
      --shadow: 0 10px 30px rgba(0,0,0,.15);
      --radius: 16px;
    }

    body.dark {
      --bg: #0b0f14;
      --card: #121821;
      --text: #e6edf3;
      --muted: #9db1c7;
      --primary: #2C2AB1;
      --overlay: rgba(0,0,0,.6);
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, "Helvetica Neue", Arial;
        background: var(--bg);
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
        transition: background .3s ease, color .3s ease;
    }

    .topbar {
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        background: rgba(10, 14, 20, .05);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,.06);
        z-index: 20;
    }
    body.dark .topbar {
        background: rgba(10,14,20,.7);
        border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .app-title {
        font-weight: 700;
        letter-spacing: .2px;
    }

    .icon-btn {
        appearance: none;
        border: 0;
        background: var(--card);
        color: var(--text);
        width: 40px; height: 40px;
        display: inline-grid; place-items: center;
        border-radius: 12px;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: transform .12s ease, background .2s ease;
        outline: none;
    }
    .icon-btn:active { transform: scale(.96); }
    .icon-btn:hover { opacity: .9; }
    .icon-btn svg { width: 22px; height: 22px; }

    .content {
      padding: 20px 16px 64px;
    }
    .card {
        background: var(--card);
        border: 1px solid rgba(0,0,0,.06);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
    }
    body.dark .card { border: 1px solid rgba(255,255,255,.06); }

    .muted { color: var(--muted); font-size: .95rem; }

    .overlay {
        position: fixed;
        inset: 0;
        background: var(--overlay);
        opacity: 0;
        pointer-events: none;
        transition: opacity .2s ease;
        z-index: 30;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }

    .side-menu {
        position: fixed;
        top: 0; right: 0;
        height: 100dvh;
        width: min(86vw, 340px);
        background: var(--card);
        border-left: 1px solid rgba(0,0,0,.06);
        box-shadow: -18px 0 40px rgba(0,0,0,.25);
        transform: translateX(100%);
        transition: transform .26s cubic-bezier(.2,.8,.2,1);
        z-index: 40;
        display: flex; flex-direction: column;
    }
    body.dark .side-menu { border-left: 1px solid rgba(255,255,255,.06); }
    .side-menu.open { transform: translateX(0); }

    .menu-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 16px; gap: 8px;
        border-bottom: 1px solid rgba(0,0,0,.06);
        background: rgba(255,255,255,.7);
        backdrop-filter: blur(8px);
        position: sticky; top: 0; z-index: 1;
    }
    body.dark .menu-header {
        border-bottom: 1px solid rgba(255,255,255,.06);
        background: rgba(12,17,24,.7);
    }

    .menu-title { font-weight: 700; }

    .menu-list { list-style: none; padding: 10px; margin: 0; display: grid; gap: 8px; }
    .menu-link {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 12px; border-radius: 12px; text-decoration: none; color: var(--text);
        background: var(--bg);
        border: 1px solid rgba(0,0,0,.06);
        transition: transform .12s ease, background .2s ease;
    }
    body.dark .menu-link { border: 1px solid rgba(255,255,255,.06); }
    .menu-link:active { transform: scale(.98); }

    .theme-toggle {
        margin: 12px;
        padding: 12px;
        background: var(--bg);
        border: 1px solid rgba(0,0,0,.06);
        border-radius: 12px;
        text-align: center;
        cursor: pointer;
    }
    body.dark .theme-toggle { border: 1px solid rgba(255,255,255,.06); }

    .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
    }

    .user-name {
        font-weight: 500;
    }

    .logout-btn {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s ease;
    }

    .logout-btn:hover {
        background: #c0392b;
        transform: translateY(-1px);
    }

    .user-info {
        display: flex;
        gap: 10px;
    }

    .header-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 30px;
    }

    .stat-card {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
    }

    .stat-card:hover {
        transform: translateY(-5px);
    }

    .stat-icon {
        font-size: 40px;
        margin-bottom: 15px;
    }

    .stat-value {
        font-size: 28px;
        font-weight: bold;
        color: #333;
        margin-bottom: 5px;
    }

    .stat-label {
        color: #666;
        font-size: 14px;
    }

  </style>
</head>
<header class="topbar">
  <h1 class="app-title" id="app-title">🪙 Coin</h1>
  <button class="icon-btn" id="btnOpen" aria-label="Abrir menu" aria-haspopup="menu" aria-controls="menu" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</header>
<body>
  <main class="content">
    <div class="stats-grid">
      <div class="stat-card" onClick="carregarPagina('html/seletorData.html')">
        <div class="stat-icon">💰</div>
          <div class="stat-value">R$ 0,00</div>
          <div class="stat-label">Saldo Atual</div>
        </div>
      </div>
    </div>
  </main>

  <div class="overlay" id="overlay" hidden></div>

  <aside class="side-menu" id="menu" role="dialog" aria-modal="true">
    <div class="menu-header">

      <div class="header-content">
        <div class="user-info">
          <span id="userName" class="user-name"></span>
        </div>
      </div>
      
      <button class="icon-btn" id="btnClose" aria-label="Fechar menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <nav>
      <ul class="menu-list">
        <li><a class="menu-link" href="home.html">🏠 Início</a></li>
        <li><a class="menu-link" href="#" onClick="carregarPagina('html/seletorData.html')">💵 Controle Financeiro</a></li>
        <li><a class="menu-link" href="#" onClick="carregarPagina('gastosFixos.html')">💰 Gastos fixos</a></li>
        <li><a class="menu-link" href="#" onClick="carregarPagina('categorias.html')">🗂️ Categorias</a></li>
        <li><a class="menu-link" href="#" onClick="carregarPagina('configuracoes.html')">⚙️ Configurações</a></li>
      </ul>
    </nav>

    <div class="theme-toggle" id="toggleTheme">🌞/🌙 Alternar Tema</div>
    
  </aside>
  <div class="confirm-overlay" id="confirmOverlay" aria-hidden="true">
    <div class="confirm-box" role="dialog" aria-modal="true">
      <div id="confirmMessage"></div>
      <div class="confirm-buttons">
        <button id="btnOk">OK</button>
        <button id="btnCancel">Cancelar</button>
      </div>
    </div>
  </div>
  <div class="confirm-overlay" id="confirmOverlayYesNo" aria-hidden="true">
    <div class="confirm-box" role="dialog" aria-modal="true">
      <div id="confirmMessageYesNo"></div>
      <div class="confirm-buttons">
        <button id="btnYes">Sim</button>
        <button id="btnNo">Não</button>
      </div>
    </div>
  </div>
</body>
    <script src="js/jquery-3.7.1.min.js"></script>
    
    <script>
        // Variaveis globais
        let editId = [];

        var agora = new Date();
        var ano = agora.getFullYear();
        var mes = String(agora.getMonth() + 1).padStart(2,"0");
        var mesView = ano + "-" + mes;
        var mesAtual = mesView;

        let config = JSON.parse(localStorage.getItem('config'))
        console.log(config);
        
        if(!config.receita){
          config.receita = [];
          localStorage.setItem('config', JSON.stringify(config));
        }
        if(!config.despesa){
          config.despesa = [];
          localStorage.setItem('config', JSON.stringify(config));
        }

        document.getElementById('userName').textContent = config.name

        const theme = localStorage.getItem('theme')
        if (theme === 'dark') {
            document.body.classList.add('dark')
        }

        function carregarPagina(url) {
            const main = document.querySelector("main");

            fetch(url)
            .then(res => res.text())
            .then(html => {
                // Insere o conteúdo no main
                main.innerHTML = html;

                // Extrai e executa todos os scripts da página carregada
                const scripts = main.querySelectorAll("script");
                scripts.forEach(oldScript => {
                    const newScript = document.createElement("script");
                    if (oldScript.src) {
                    // Se for script externo
                    newScript.src = oldScript.src;
                    } else {
                    // Se for script inline
                    newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript);
                    oldScript.remove();

                    //close menu
                    menu.classList.remove('open');
                    overlay.classList.remove('open');
                    btnOpen.setAttribute('aria-expanded', 'false');
                    const onEnd = () => {
                    overlay.hidden = true;
                    overlay.removeEventListener('transitionend', onEnd);
                    };
                    overlay.addEventListener('transitionend', onEnd);
                    document.body.style.overflow = '';
                });
            })
            .catch(err => {
                console.error("Erro ao carregar página:", err);
            });
        }

        (function() {
        const menu = document.getElementById('menu');
        const overlay = document.getElementById('overlay');
        const btnOpen = document.getElementById('btnOpen');
        const btnClose = document.getElementById('btnClose');
        const toggleTheme = document.getElementById('toggleTheme');

        let lastFocused = null;

        function openMenu() {
            lastFocused = document.activeElement;
            menu.classList.add('open');
            overlay.classList.add('open');
            overlay.hidden = false;
            btnOpen.setAttribute('aria-expanded', 'true');
            btnClose.focus();
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            menu.classList.remove('open');
            overlay.classList.remove('open');
            btnOpen.setAttribute('aria-expanded', 'false');
            const onEnd = () => {
            overlay.hidden = true;
            overlay.removeEventListener('transitionend', onEnd);
            };
            overlay.addEventListener('transitionend', onEnd);
            document.body.style.overflow = '';
            if (lastFocused) lastFocused.focus();
        }

        btnOpen.addEventListener('click', openMenu);
        btnClose.addEventListener('click', closeMenu);
        overlay.addEventListener('click', closeMenu);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menu.classList.contains('open')) closeMenu();
        });

        toggleTheme.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        });
        })();
    </script>
</html>
