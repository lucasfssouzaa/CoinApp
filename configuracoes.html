<html lang="pt-br">
<body>
  <h1>Configuracoes</h1>
  <div style="margin-top: 20px;">
    <label>Nome: </label><br>
    <input type="text" id="nome" class="campo">
    <div style="display: flex; gap: 10px; justify-content: end; margin-top: 10px;">
      <button onclick="alterarConfiguracoes()" class="botao botaoAdd">Salvar Configurações</button>
    </div>
    
  </div>
</body>
<script>
  $('#nome').val(JSON.parse(localStorage.getItem('config')).name);

  function alterarConfiguracoes(){
    let nome = $('#nome').val();
    nome = nome.trim();
    if(nome == ''){
      AlertError('Preencha o nome');
      return;
    }
    localStorage.setItem('config', JSON.stringify({...JSON.parse(localStorage.getItem('config')), name: nome}));
    AlertSuccess('Configurações atualizadas com sucesso');
  }
</script>
</html>
